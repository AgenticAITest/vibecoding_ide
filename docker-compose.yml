services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - VIBECODER_DOMAIN=${VIBECODER_DOMAIN:-localhost}
    depends_on:
      - vibecoder
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vibecoder
      POSTGRES_USER: vibecoder
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vibecoder_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped

  vibecoder:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3001"
    volumes:
      - user-projects:/projects
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://vibecoder:${POSTGRES_PASSWORD:-vibecoder_dev}@postgres:5432/vibecoder
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - VIBECODER_PROJECTS_BASE=/projects
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  user-projects:
  caddy-data:
  caddy-config:
  pgdata:
