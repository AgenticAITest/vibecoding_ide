services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: vibecoder
      POSTGRES_USER: vibecoder
      POSTGRES_PASSWORD: vibecoder_dev
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata-dev:
